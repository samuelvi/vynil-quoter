services:
  go-scripts:
    build:
      context: ../..
      dockerfile: docker/test/Dockerfile
    working_dir: /workspace
    volumes:
      - type: bind
        source: ../..
        target: /workspace
      - type: bind
        source: ../../.cache/go
        target: /go/pkg/mod
      - type: bind
        source: ../../.cache/go-build
        target: /root/.cache/go-build
    environment:
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
    command: tail -f /dev/null
